<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор памятника — СонДуши.рф</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background: var(--gray-bg);
            color: var(--text);
        }

        .product-page {
            padding: 40px 20px 70px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .product-container {
            display: grid;
            grid-template-columns: 1fr 1.1fr;
            gap: 40px;
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.06);
        }

        .product-image {
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            border: 1px solid var(--border);
            padding: 20px;
            gap: 20px;
        }

        .product-image i {
            font-size: 100px;
            color: var(--text-light);
            opacity: 0.3;
        }

        .product-image .image-placeholder {
            color: var(--text-light);
            font-size: 14px;
            opacity: 0.6;
        }

        .product-image .badge {
            display: inline-block;
            background: var(--gold);
            color: var(--dark);
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .product-info h1 {
            font-size: 28px;
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .product-info .sku {
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .product-info .sku span {
            font-weight: 700;
            color: var(--dark);
        }

        .product-price-block {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 20px;
            background: var(--gray-bg);
            padding: 12px 20px;
            border-radius: 10px;
        }

        .product-price {
            font-size: 32px;
            font-weight: 800;
            color: var(--dark);
        }

        .product-price span {
            font-size: 18px;
            font-weight: 400;
            color: var(--text-light);
        }

        .product-price-block .old-price {
            font-size: 20px;
            color: var(--text-light);
            text-decoration: line-through;
            margin-left: 8px;
        }

        .accordion {
            margin-top: 16px;
        }

        .accordion-item {
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .accordion-header {
            width: 100%;
            background: #fff;
            border: none;
            padding: 14px 18px;
            text-align: left;
            cursor: pointer;
            font-weight: 700;
            font-size: 15px;
            color: var(--dark);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background .2s;
            font-family: 'Montserrat', sans-serif;
        }

        .accordion-header:hover {
            background: var(--gray-bg);
        }

        .accordion-header i {
            transition: transform .3s;
            color: var(--gold);
            font-size: 14px;
        }

        .accordion-item.active .accordion-header i {
            transform: rotate(180deg);
        }

        .accordion-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height .3s ease;
            padding: 0 18px;
            background: #fafafa;
        }

        .accordion-item.active .accordion-body {
            max-height: 600px;
            padding: 16px 18px 18px;
        }

        .option-group {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 8px;
        }

        .option-btn {
            padding: 8px 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
            font-size: 13px;
            transition: all .2s;
            font-family: 'Open Sans', sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .option-btn:hover {
            border-color: var(--gold);
        }

        .option-btn.active {
            border-color: var(--gold);
            background: var(--gold);
            color: var(--dark);
            font-weight: 700;
        }

        .option-btn .price-tag {
            font-size: 11px;
            font-weight: 400;
            color: var(--text-light);
            opacity: 0.7;
        }

        .option-btn.active .price-tag {
            color: var(--dark);
            opacity: 0.8;
        }

        .selected-options {
            background: var(--gray-bg);
            border-radius: 10px;
            padding: 16px 20px;
            margin-top: 20px;
        }

        .selected-options h3 {
            font-size: 14px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .selected-options .option-line {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            padding: 4px 0;
            border-bottom: 1px dashed var(--border);
        }

        .selected-options .option-line:last-child {
            border-bottom: none;
        }

        .selected-options .option-line .label {
            color: var(--text-light);
        }

        .selected-options .option-line .value {
            font-weight: 600;
            color: var(--dark);
        }

        .total-price-block {
            background: var(--dark);
            color: #fff;
            padding: 16px 24px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
        }

        .total-price-block .label {
            font-size: 14px;
            opacity: .7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .total-price-block .price {
            font-size: 28px;
            font-weight: 800;
            color: var(--gold-light);
        }

        .product-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .product-actions .btn-primary {
            padding: 14px 32px;
            font-size: 16px;
            flex: 1;
            min-width: 180px;
        }

        .btn-telegram {
            background: #0088cc;
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 24px;
            border-radius: var(--radius);
            font-weight: 700;
            font-size: 16px;
            transition: background .2s;
            font-family: 'Montserrat', sans-serif;
            border: none;
            cursor: pointer;
            text-decoration: none;
            flex: 1;
            min-width: 140px;
        }

        .btn-telegram:hover {
            background: #006699;
            color: #fff;
        }

        .btn-max {
            background: #6f42c1;
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 24px;
            border-radius: var(--radius);
            font-weight: 700;
            font-size: 16px;
            transition: background .2s;
            font-family: 'Montserrat', sans-serif;
            border: none;
            cursor: pointer;
            text-decoration: none;
            flex: 1;
            min-width: 140px;
        }

        .btn-max:hover {
            background: #5530a3;
            color: #fff;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--text-light);
            font-size: 14px;
            text-decoration: none;
            grid-column: 1 / -1;
        }

        .back-link i {
            margin-right: 6px;
        }

        .product-loading {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
        }

        .product-error {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
        }

        .product-error h2 {
            color: var(--dark);
        }

        .product-error p {
            color: var(--text-light);
            margin-top: 12px;
        }

        .product-error a {
            color: var(--gold);
            text-decoration: none;
        }

        /* ===== МОДАЛКА ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.open {
            display: flex;
        }
        .modal {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            position: relative;
            animation: slideIn .3s ease;
        }
        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: var(--text-light);
            line-height: 1;
        }
        .modal h3 {
            font-size: 22px;
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 6px;
        }
        .modal p {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 24px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }
        .form-group label {
            font-size: 13px;
            font-weight: 700;
            color: var(--dark);
            font-family: 'Montserrat', sans-serif;
        }
        .form-group input {
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 11px 14px;
            font-size: 14px;
            font-family: 'Open Sans', sans-serif;
            outline: none;
            transition: border-color .2s;
            color: var(--text);
            background: #fff;
            width: 100%;
        }
        .form-group input:focus {
            border-color: var(--dark);
        }
        .btn-submit {
            width: 100%;
            background: var(--gold);
            color: var(--dark);
            font-weight: 800;
            font-size: 15px;
            padding: 14px;
            border-radius: var(--radius);
            border: none;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            transition: background .2s;
        }
        .btn-submit:hover {
            background: var(--gold-light);
        }
        .order-summary {
            background: var(--gray-bg);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .order-summary .line {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid var(--border);
        }
        .order-summary .line:last-child {
            border-bottom: none;
        }
        .order-summary .label {
            color: var(--text-light);
        }
        .order-summary .value {
            font-weight: 600;
            color: var(--dark);
        }
        .order-summary .total-line {
            display: flex;
            justify-content: space-between;
            padding: 8px 0 0;
            border-top: 2px solid var(--gold);
            margin-top: 4px;
            font-weight: 700;
        }
        .order-summary .total-line .price {
            font-weight: 800;
            font-size: 18px;
            color: var(--gold);
        }

        @media (max-width: 992px) {
            .product-container {
                grid-template-columns: 1fr;
                padding: 24px;
            }
            .product-image {
                min-height: 250px;
            }
            .product-price {
                font-size: 28px;
            }
            .product-actions .btn-primary,
            .btn-telegram,
            .btn-max {
                flex: 1 1 100%;
            }
            .option-group {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            }
        }

        @media (max-width: 600px) {
            .product-container {
                padding: 16px;
            }
            .option-group {
                grid-template-columns: 1fr 1fr;
            }
            .total-price-block {
                flex-direction: column;
                gap: 8px;
                text-align: center;
            }
            .modal {
                padding: 24px 20px;
            }
        }

@media (max-width: 768px) {
    .product-container {
        grid-template-columns: 1fr;
        padding: 16px;
        gap: 24px;
        border-radius: 12px;
    }

    .product-image {
        min-height: 200px;
        padding: 16px;
        gap: 12px;
        border-radius: 10px;
    }

    .product-image i {
        font-size: 60px;
    }

    .product-image .image-placeholder {
        font-size: 12px;
    }

    .product-image .badge {
        font-size: 10px;
        padding: 2px 12px;
    }

    .product-info h1 {
        font-size: 22px;
    }

    .product-info .sku {
        font-size: 12px;
        margin-bottom: 12px;
        padding-bottom: 12px;
    }

    .product-price-block {
        padding: 10px 16px;
        border-radius: 8px;
        margin-bottom: 16px;
        flex-wrap: wrap;
        gap: 4px;
    }

    .product-price {
        font-size: 24px;
    }

    .product-price span {
        font-size: 15px;
    }

    .product-price-block .old-price {
        font-size: 16px;
    }

    /* Аккордеон */
    .accordion-item {
        border-radius: 6px;
        margin-bottom: 6px;
    }

    .accordion-header {
        padding: 10px 14px;
        font-size: 13px;
    }

    .accordion-header i {
        font-size: 12px;
    }

    .accordion-item.active .accordion-body {
        padding: 12px 14px 14px;
    }

    .option-group {
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 6px;
    }

    .option-btn {
        padding: 6px 10px;
        font-size: 12px;
        border-radius: 6px;
    }

    .option-btn .price-tag {
        font-size: 10px;
    }

    /* Блок "Вы выбрали" */
    .selected-options {
        padding: 12px 16px;
        margin-top: 16px;
        border-radius: 8px;
    }

    .selected-options h3 {
        font-size: 12px;
    }

    .selected-options .option-line {
        font-size: 12px;
        padding: 3px 0;
    }

    .total-price-block {
        padding: 12px 16px;
        border-radius: 8px;
        flex-direction: row;
        gap: 8px;
        margin-top: 12px;
        flex-wrap: wrap;
    }

    .total-price-block .label {
        font-size: 12px;
    }

    .total-price-block .price {
        font-size: 22px;
    }

    /* Кнопки действий */
    .product-actions {
        gap: 8px;
        margin-top: 12px;
        flex-direction: column;
    }

    .product-actions .btn-primary {
        padding: 12px 20px;
        font-size: 15px;
        flex: 1 1 100%;
        min-width: 0;
    }

    .btn-telegram,
    .btn-max {
        padding: 10px 16px;
        font-size: 14px;
        flex: 1 1 100%;
        min-width: 0;
    }

    .back-link {
        font-size: 13px;
        margin-bottom: 12px;
    }

    /* Модалка */
    .modal {
        padding: 24px 20px;
        max-width: 100%;
        margin: 0 8px;
        border-radius: 12px;
    }

    .modal h3 {
        font-size: 18px;
    }

    .modal p {
        font-size: 13px;
        margin-bottom: 16px;
    }

    .order-summary {
        font-size: 13px;
        padding: 10px 12px;
    }

    .order-summary .line {
        padding: 3px 0;
    }

    .order-summary .total-line .price {
        font-size: 16px;
    }

    .form-group input {
        padding: 10px 12px;
        font-size: 14px;
    }

    .btn-submit {
        padding: 12px;
        font-size: 14px;
    }
}

/* Очень маленькие телефоны (до 480px) */
@media (max-width: 480px) {
    .product-container {
        padding: 12px;
        gap: 16px;
    }

    .product-image {
        min-height: 150px;
        border-radius: 8px;
    }

    .product-image i {
        font-size: 48px;
    }

    .product-info h1 {
        font-size: 19px;
    }

    .product-price {
        font-size: 20px;
    }

    .product-price span {
        font-size: 13px;
    }

    .product-price-block {
        padding: 8px 12px;
    }

    .accordion-header {
        padding: 8px 12px;
        font-size: 12px;
    }

    .accordion-item.active .accordion-body {
        padding: 10px 12px 12px;
    }

    .option-group {
        grid-template-columns: 1fr 1fr;
        gap: 4px;
    }

    .option-btn {
        padding: 5px 8px;
        font-size: 11px;
    }

    .selected-options {
        padding: 10px 12px;
    }

    .selected-options .option-line {
        font-size: 11px;
    }

    .total-price-block .price {
        font-size: 18px;
    }

    .product-actions .btn-primary {
        padding: 10px 16px;
        font-size: 14px;
    }

    .btn-telegram,
    .btn-max {
        padding: 8px 12px;
        font-size: 13px;
    }

    .modal {
        padding: 16px 14px;
    }

    .modal h3 {
        font-size: 16px;
    }

    .order-summary {
        font-size: 12px;
        padding: 8px 10px;
    }

    .order-summary .total-line .price {
        font-size: 14px;
    }

    .form-group input {
        padding: 8px 10px;
        font-size: 13px;
    }

    .btn-submit {
        padding: 10px;
        font-size: 13px;
    }
}
    </style>
</head>
<body>

<header id="site-header"></header>

<section class="product-page">
    <div class="product-container" id="productContainer">
        <div class="product-loading">
            <i class="fas fa-spinner fa-spin" style="font-size:32px;color:var(--gold);"></i>
            <p style="margin-top:16px;color:var(--text-light);">Загрузка конструктора...</p>
        </div>
    </div>
</section>

<footer id="site-footer"></footer>

<!-- МОДАЛКА ДЛЯ ЗАКАЗА -->
<div class="modal-overlay" id="orderModalOverlay" onclick="closeOrderModalOutside(event)">
    <div class="modal" style="max-width:480px;">
        <button class="modal-close" onclick="closeOrderModal()">✕</button>
        <h3 style="margin-bottom:8px;"><i class="fas fa-shopping-cart" style="color:var(--gold); margin-right:10px;"></i>Оформление заказа</h3>
        <p style="margin-bottom:20px; color:var(--text-light); font-size:14px;">Заполните данные, и мы свяжемся с вами</p>

        <div class="order-summary" id="orderSummary">
            <div class="line"><span class="label">Товар:</span><span class="value" id="summaryProduct">—</span></div>
            <div class="line"><span class="label">Размер:</span><span class="value" id="summarySize">—</span></div>
            <div class="line"><span class="label">Материал:</span><span class="value" id="summaryMaterial">—</span></div>
            <div class="line"><span class="label">Цвет камня:</span><span class="value" id="summaryColor">—</span></div>
            <div class="line"><span class="label">Гравировка:</span><span class="value" id="summaryEngraving">—</span></div>
            <div class="line"><span class="label">Отделка:</span><span class="value" id="summaryFinish">—</span></div>
            <div class="line"><span class="label">Услуги:</span><span class="value" id="summaryServices">—</span></div>
            <div class="total-line"><span>Итого:</span><span class="price" id="summaryTotal">0 ₽</span></div>
        </div>

        <div id="orderForm">
            <div class="form-group">
                <label>Ваше имя *</label>
                <input type="text" id="modalName" placeholder="Иван Иванов">
            </div>
            <div class="form-group">
                <label>Номер телефона *</label>
                <input type="tel" id="modalPhone" placeholder="+7 (___) ___-__-__">
            </div>
            <button class="btn-submit" onclick="submitOrderFromModal()">Отправить заказ</button>
        </div>
    </div>
</div>

<script src="../js/main.js"></script>
<script src="../js/validation.js"></script>
<script src="../js/header.js"></script>
<script>
    // ============================================
    // КОНСТРУКТОР ТОВАРА
    // ============================================

    var currentProduct = null;
    var selectedOptions = {};
    var totalPrice = 0;

    function loadProduct() {
        var container = document.getElementById('productContainer');
        if (!container) return;

        var params = new URLSearchParams(window.location.search);
        var id = parseInt(params.get('id'));

        if (typeof loadProducts === 'function') {
            loadProducts(function(products) {
                var product = products.find(function(p) { return p.id === id; });
                if (!product) {
                    container.innerHTML = `
                        <div class="product-error" style="grid-column:1/-1;text-align:center;padding:60px 20px;">
                            <h2>Товар не найден</h2>
                            <p><a href="../catalog/" style="color:var(--gold);">Вернуться в каталог</a></p>
                        </div>
                    `;
                    return;
                }
                currentProduct = product;
                renderConstructor(product);
            });
        } else {
            container.innerHTML = `<div class="product-error"><h2>Ошибка загрузки</h2></div>`;
        }
    }

    function renderConstructor(product) {
        var container = document.getElementById('productContainer');

        // Базовые опции (если нет в JSON — подставляем)
        var sizes = product.sizes || [
            { label: '120×60 см', price: 0 },
            { label: '150×75 см', price: 4000 },
            { label: '180×90 см', price: 8000 }
        ];
        var materials = product.materials || [
            { label: 'Гранит габбро', price: 0 },
            { label: 'Гранит красный', price: 3000 },
            { label: 'Мрамор белый', price: 5000 }
        ];
        var colors = product.colors || [
            { label: 'Серый', price: 0 },
            { label: 'Чёрный', price: 2000 },
            { label: 'Красный', price: 4000 },
            { label: 'Белый', price: 5000 }
        ];
        var engravings = product.engravings || [
            { label: 'Без гравировки', price: 0 },
            { label: 'Портрет', price: 3500 },
            { label: 'Текст', price: 1500 },
            { label: 'Орнамент', price: 2500 }
        ];
        var finishes = product.finishes || [
            { label: 'Полировка', price: 0 },
            { label: 'Шлифовка', price: 1500 },
            { label: 'Матовая', price: 1000 },
            { label: 'Золочение', price: 5000 }
        ];
        var services = product.services || [
            { label: 'Установка на кладбище', price: 5000 },
            { label: 'Доставка по Москве', price: 2000 },
            { label: 'Демонтаж старого памятника', price: 3000 }
        ];

        // Инициализация выбранных опций (первые элементы)
        selectedOptions = {
            size: sizes[0],
            material: materials[0],
            color: colors[0],
            engraving: engravings[0],
            finish: finishes[0],
            services: []
        };

        var accordionHtml = '';

        // Функция для генерации группы кнопок
        function renderOptionGroup(name, label, options, key) {
            return `
                <div class="accordion-item active">
                    <button class="accordion-header" onclick="toggleAccordion(this)">
                        ${label}
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="accordion-body">
                        <div class="option-group" data-key="${key}">
                            ${options.map(function(opt, idx) {
                                var isActive = idx === 0 ? 'active' : '';
                                return `
                                    <button class="option-btn ${isActive}" onclick="selectOption(this, '${key}', '${opt.label}', ${opt.price})">
                                        ${opt.label}
                                        <span class="price-tag">${opt.price > 0 ? '+ ' + opt.price.toLocaleString('ru-RU') + ' ₽' : '—'}</span>
                                    </button>
                                `;
                            }).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        accordionHtml += renderOptionGroup('size', '📐 Размеры', sizes, 'size');
        accordionHtml += renderOptionGroup('material', '🪨 Материал', materials, 'material');
        accordionHtml += renderOptionGroup('color', '🎨 Цвет камня', colors, 'color');
        accordionHtml += renderOptionGroup('engraving', '✍️ Гравировка', engravings, 'engraving');
        accordionHtml += renderOptionGroup('finish', '✨ Отделка', finishes, 'finish');

        // Отдельно для услуг (чекбоксы, не радио-кнопки)
        var servicesHtml = `
            <div class="accordion-item">
                <button class="accordion-header" onclick="toggleAccordion(this)">
                    🛠 Дополнительные услуги
                    <i class="fas fa-chevron-down"></i>
                </button>
                <div class="accordion-body">
                    ${services.map(function(s) {
                        return `
                            <div style="display:flex; align-items:center; gap:12px; padding:6px 0; border-bottom:1px solid var(--border);">
                                <input type="checkbox" id="service_${s.label.replace(/\s/g, '_')}" onchange="toggleService(this, '${s.label}', ${s.price})" style="width:18px; height:18px; accent-color:var(--gold);">
                                <label for="service_${s.label.replace(/\s/g, '_')}" style="flex:1; cursor:pointer; font-size:14px;">${s.label}</label>
                                <span style="font-weight:700; font-size:14px;">+${s.price.toLocaleString('ru-RU')} ₽</span>
                            </div>
                        `;
                    }).join('')}
                </div>
            </div>
        `;

        container.innerHTML = `
            <a href="../catalog/" class="back-link">
                <i class="fas fa-arrow-left"></i> Назад в каталог
            </a>

            <div class="product-image">
                <span class="badge">${product.category || 'Памятник'}</span>
                <i class="fas fa-${product.imageIcon || 'mountain'}"></i>
                <span class="image-placeholder">Фото в разработке</span>
            </div>

            <div class="product-info">
                <h1>${product.name}</h1>
                <div class="sku">Артикул: <span>${product.sku || 'AM' + (product.id || '0000')}</span></div>

                <div class="product-price-block">
                    <div class="product-price" id="basePriceDisplay">${product.price.toLocaleString('ru-RU')} <span>₽</span></div>
                </div>

                <div class="accordion" id="accordion">
                    ${accordionHtml}
                    ${servicesHtml}
                </div>

                <!-- Блок выбранных опций -->
                <div class="selected-options" id="selectedOptions">
                    <h3>Вы выбрали</h3>
                    <div id="selectedOptionsList">
                        <div class="option-line">
                            <span class="label">Размер:</span>
                            <span class="value" id="selectedSize">${sizes[0].label}</span>
                        </div>
                        <div class="option-line">
                            <span class="label">Материал:</span>
                            <span class="value" id="selectedMaterial">${materials[0].label}</span>
                        </div>
                        <div class="option-line">
                            <span class="label">Цвет камня:</span>
                            <span class="value" id="selectedColor">${colors[0].label}</span>
                        </div>
                        <div class="option-line">
                            <span class="label">Гравировка:</span>
                            <span class="value" id="selectedEngraving">${engravings[0].label}</span>
                        </div>
                        <div class="option-line">
                            <span class="label">Отделка:</span>
                            <span class="value" id="selectedFinish">${finishes[0].label}</span>
                        </div>
                        <div class="option-line" id="selectedServicesLine" style="display:none;">
                            <span class="label">Услуги:</span>
                            <span class="value" id="selectedServicesList">—</span>
                        </div>
                    </div>
                </div>

                <div class="total-price-block">
                    <span class="label">Итоговая цена</span>
                    <span class="price" id="totalPrice">${product.price.toLocaleString('ru-RU')} ₽</span>
                </div>

                <div class="product-actions">
                    <button class="btn-primary" onclick="openOrderModal()">
                        <i class="fas fa-shopping-cart"></i> Заказать
                    </button>
                    <a href="https://t.me/ваш_телеграм" target="_blank" class="btn-telegram">
                        <i class="fab fa-telegram-plane"></i> Telegram
                    </a>
                    <a href="https://ваша-ссылка-на-max" target="_blank" class="btn-max">
                        <i class="fas fa-comment"></i> Max
                    </a>
                </div>
            </div>
        `;

        var firstAccordion = document.querySelector('.accordion-item');
        if (firstAccordion) firstAccordion.classList.add('active');

        updatePriceAndSummary();
    }

    function toggleAccordion(btn) {
        var item = btn.parentElement;
        var isActive = item.classList.contains('active');

        document.querySelectorAll('.accordion-item').forEach(function(el) {
            el.classList.remove('active');
        });

        if (!isActive) {
            item.classList.add('active');
        }
    }

    function selectOption(btn, key, label, price) {
        var group = btn.closest('.option-group');
        if (!group) return;

        group.querySelectorAll('.option-btn').forEach(function(b) {
            b.classList.remove('active');
        });
        btn.classList.add('active');

        selectedOptions[key] = { label: label, price: price };

        updatePriceAndSummary();

        var map = {
            'size': 'selectedSize',
            'material': 'selectedMaterial',
            'color': 'selectedColor',
            'engraving': 'selectedEngraving',
            'finish': 'selectedFinish'
        };
        var elId = map[key];
        if (elId) {
            var el = document.getElementById(elId);
            if (el) el.textContent = label;
        }
    }

    function toggleService(checkbox, label, price) {
        if (checkbox.checked) {
            if (!selectedOptions.services) selectedOptions.services = [];
            selectedOptions.services.push({ label: label, price: price });
        } else {
            selectedOptions.services = selectedOptions.services.filter(function(s) {
                return s.label !== label;
            });
        }

        updatePriceAndSummary();
        updateServicesSummary();
    }

    function updateServicesSummary() {
        var listEl = document.getElementById('selectedServicesList');
        var lineEl = document.getElementById('selectedServicesLine');
        if (!listEl || !lineEl) return;

        var services = selectedOptions.services || [];
        if (services.length === 0) {
            lineEl.style.display = 'none';
            return;
        }

        lineEl.style.display = 'flex';
        listEl.textContent = services.map(function(s) { return s.label; }).join(', ');
    }

    function updatePriceAndSummary() {
        if (!currentProduct) return;

        var base = currentProduct.basePrice || currentProduct.price || 0;
        var total = base;

        var keys = ['size', 'material', 'color', 'engraving', 'finish'];
        keys.forEach(function(key) {
            if (selectedOptions[key] && selectedOptions[key].price) {
                total += selectedOptions[key].price;
            }
        });

        if (selectedOptions.services) {
            selectedOptions.services.forEach(function(s) {
                total += s.price;
            });
        }

        totalPrice = total;

        var priceEl = document.getElementById('totalPrice');
        if (priceEl) {
            priceEl.textContent = total.toLocaleString('ru-RU') + ' ₽';
        }

        var baseDisplay = document.getElementById('basePriceDisplay');
        if (baseDisplay) {
            baseDisplay.innerHTML = base.toLocaleString('ru-RU') + ' <span>₽</span>';
        }
    }

    function openOrderModal() {
        if (!currentProduct) return;

        document.getElementById('summaryProduct').textContent = currentProduct.name;
        document.getElementById('summarySize').textContent = selectedOptions.size ? selectedOptions.size.label : 'Не выбран';
        document.getElementById('summaryMaterial').textContent = selectedOptions.material ? selectedOptions.material.label : 'Не выбран';
        document.getElementById('summaryColor').textContent = selectedOptions.color ? selectedOptions.color.label : 'Не выбран';
        document.getElementById('summaryEngraving').textContent = selectedOptions.engraving ? selectedOptions.engraving.label : 'Не выбрана';
        document.getElementById('summaryFinish').textContent = selectedOptions.finish ? selectedOptions.finish.label : 'Не выбрана';

        var services = selectedOptions.services || [];
        var servicesText = services.length > 0 ? services.map(function(s) { return s.label; }).join(', ') : 'Не выбраны';
        document.getElementById('summaryServices').textContent = servicesText;

        var total = document.getElementById('totalPrice')?.textContent || '0 ₽';
        document.getElementById('summaryTotal').textContent = total;

        // Очищаем поля
        document.getElementById('modalName').value = '';
        document.getElementById('modalPhone').value = '';

        document.getElementById('orderModalOverlay').classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeOrderModal() {
        document.getElementById('orderModalOverlay').classList.remove('open');
        document.body.style.overflow = '';
    }

    function closeOrderModalOutside(e) {
        var overlay = document.getElementById('orderModalOverlay');
        if (e.target === overlay) closeOrderModal();
    }

    function submitOrderFromModal() {
        var name = document.getElementById('modalName')?.value?.trim() || '';
        var phone = document.getElementById('modalPhone')?.value?.trim() || '';

        if (!name || !phone) {
            alert('Пожалуйста, заполните имя и телефон');
            return;
        }

        var digits = phone.replace(/\D/g, '');
        if (digits.length < 10) {
            alert('Введите полный номер телефона (10-11 цифр)');
            return;
        }

        var size = selectedOptions.size ? selectedOptions.size.label : 'Не выбран';
        var material = selectedOptions.material ? selectedOptions.material.label : 'Не выбран';
        var color = selectedOptions.color ? selectedOptions.color.label : 'Не выбран';
        var engraving = selectedOptions.engraving ? selectedOptions.engraving.label : 'Не выбрана';
        var finish = selectedOptions.finish ? selectedOptions.finish.label : 'Не выбрана';

        var services = selectedOptions.services || [];
        var servicesText = services.length > 0 ? services.map(function(s) { return s.label; }).join(', ') : 'Не выбраны';

        var total = document.getElementById('totalPrice')?.textContent || '0 ₽';

        var message = 'Заказ с сайта (конструктор):\n\n' +
            'Товар: ' + currentProduct.name + '\n' +
            'Размер: ' + size + '\n' +
            'Материал: ' + material + '\n' +
            'Цвет камня: ' + color + '\n' +
            'Гравировка: ' + engraving + '\n' +
            'Отделка: ' + finish + '\n' +
            'Услуги: ' + servicesText + '\n' +
            'Итоговая цена: ' + total + '\n\n' +
            'Клиент: ' + name + '\n' +
            'Телефон: ' + phone;

        fetch('https://formspree.io/f/mwvdpbap', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                name: name,
                phone: phone,
                interest: currentProduct.name,
                comment: message,
                source: 'Конструктор (модалка)'
            })
        })
        .then(function(response) {
            if (response.ok) {
                alert('\u2705 Заявка отправлена! Мы свяжемся с вами для подтверждения.');
                closeOrderModal();
            } else {
                alert('\u274c Ошибка отправки. Попробуйте позже.');
            }
        })
        .catch(function(error) {
            console.error('Ошибка:', error);
            alert('\u274c Ошибка отправки. Проверьте интернет.');
        });
    }

    document.addEventListener('DOMContentLoaded', function() {
        loadProduct();
    });
</script>
</body>
</html>
